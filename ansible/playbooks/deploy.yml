---
- name: Deploy Redmine via Docker Compose
  hosts: redmine
  become: true
  gather_facts: true

  tasks:

    # ---------- 1. Базовая подготовка системы ----------
    - name: Wait for apt to be available
      ansible.builtin.shell: |
        while pgrep -x apt >/dev/null || pgrep -x apt-get >/dev/null || pgrep -x dpkg >/dev/null; do sleep 2; done
      changed_when: false

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system dependencies
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3
          - python3-pip
        state: present

    # ---------- 2. Установка Docker (официальный репозиторий) ----------
    - name: Ensure /etc/apt/keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'
        force: false

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Install Docker Engine and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker service is running and enabled
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    # ---------- 3. Деплой Redmine ----------
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ redmine_dir }}"
        state: directory
        mode: '0755'

    - name: Render docker-compose.yml from template
      ansible.builtin.template:
        src: ../templates/docker-compose.yml.j2
        dest: "{{ redmine_dir }}/docker-compose.yml"
        mode: '0644'
      notify: Restart Redmine stack

    - name: Pull latest images
      community.docker.docker_compose_v2:
        project_src: "{{ redmine_dir }}"
        pull: always
        state: present
      register: compose_result
      ignore_errors: true

    - name: Fallback — run docker compose up via shell (если модуль недоступен)
      ansible.builtin.shell: |
        cd {{ redmine_dir }}
        docker compose pull
        docker compose up -d
      when: compose_result.failed | default(false)
      changed_when: true

    - name: Wait until Redmine HTTP is up
      ansible.builtin.uri:
        url: "http://localhost:{{ redmine_port }}/"
        status_code: [200, 302, 401]
      register: redmine_health
      retries: 30
      delay: 5
      until: redmine_health.status in [200, 302, 401]

    - name: Show access URL
      ansible.builtin.debug:
        msg: "Redmine доступен по адресу: http://{{ redmine_domain | default(ansible_host) }}/"

  handlers:
    - name: Restart Redmine stack
      ansible.builtin.shell: |
        cd {{ redmine_dir }}
        docker compose up -d --remove-orphans
      changed_when: true
